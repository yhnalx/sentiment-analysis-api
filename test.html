<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentiment API Test</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 40px;
        max-width: 700px;
        margin: auto;
      }

      h1 {
        text-align: center;
      }

      textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        font-size: 16px;
        margin-top: 10px;
      }

      button {
        margin-top: 10px;
        padding: 10px 18px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        background: #007bff;
        color: white;
        border-radius: 5px;
      }

      button:hover {
        background: #0056b3;
      }

      .result {
        margin-top: 25px;
        padding: 15px;
        background: white;
        border-radius: 8px;
      }

      .sentiment {
        font-size: 20px;
        font-weight: bold;
      }

      .positive {
        color: green;
      }
      .neutral {
        color: orange;
      }
      .negative {
        color: red;
      }

      pre {
        background: #eee;
        padding: 10px;
        border-radius: 6px;
      }
    </style>
  </head>

  <body>
    <h1>Sentiment Analysis Test</h1>

    <textarea id="textInput">I love this product so much!</textarea>

    <button onclick="analyze()">Analyze Sentiment</button>

    <div class="result" id="resultBox" style="display: none">
      <p class="sentiment" id="sentimentText"></p>
      <p id="confidence"></p>

      <h3>Full API Response</h3>
      <pre id="rawResponse"></pre>
    </div>

    <script>
      async function analyze() {
        const text = document.getElementById("textInput").value;

        const resultBox = document.getElementById("resultBox");
        const sentimentText = document.getElementById("sentimentText");
        const confidence = document.getElementById("confidence");
        const rawResponse = document.getElementById("rawResponse");

        sentimentText.innerHTML = "Loading...";
        confidence.innerHTML = "";
        rawResponse.textContent = "";
        resultBox.style.display = "block";

        try {
          const response = await fetch(
            "https://sentiment-analysis-api-d635.onrender.com/predict",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ text: text }),
            },
          );

          const data = await response.json();

          const sentiment = data.prediction;

          sentimentText.innerHTML = "Prediction: " + sentiment;

          sentimentText.className = "sentiment " + sentiment;

          confidence.innerHTML =
            "Negative: " +
            data.scores.negative.toFixed(3) +
            "<br>" +
            "Neutral: " +
            data.scores.neutral.toFixed(3) +
            "<br>" +
            "Positive: " +
            data.scores.positive.toFixed(3);

          rawResponse.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          sentimentText.innerHTML = "Request failed";
          confidence.innerHTML = err.message;
          console.error(err);
        }
      }
    </script>
  </body>
</html>
